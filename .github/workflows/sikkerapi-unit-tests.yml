name: SikkerApi unit tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/TestAPI/TestAPI.csproj', '**/Rest_SikkerApi.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        working-directory: ./Rest_SikkerApi
        run: dotnet restore TestAPI/TestAPI.csproj

      - name: Build test project
        working-directory: ./Rest_SikkerApi
        run: dotnet build TestAPI/TestAPI.csproj --no-restore --configuration Release

      - name: Run unit tests
        working-directory: ./Rest_SikkerApi
        run: dotnet test TestAPI/TestAPI.csproj --no-build --configuration Release --verbosity normal
