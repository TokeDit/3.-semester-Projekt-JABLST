# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js for building the Vue/Vite frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install Vue/Vite dependencies
      - name: Install frontend dependencies
        working-directory: ./FrontEnd/SikkerhedsFrontEnd
        run: npm install

      # Step 4: Build the Vue app (outputs to FrontEnd/SikkerhedsFrontEnd/dist)
      - name: Build Vue frontend
        working-directory: ./FrontEnd/SikkerhedsFrontEnd
        run: npm run build

      # Step 5: Copy the built Vue files into the .NET project's wwwroot folder
      # This is how .NET will serve the frontend as static files
      - name: Copy Vue build to .NET wwwroot
        run: |
          mkdir -p ./Rest_SikkerApi/wwwroot
          cp -r ./FrontEnd/SikkerhedsFrontEnd/dist/. ./Rest_SikkerApi/wwwroot/

      # Step 6: Set up .NET 9 SDK
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Step 7: Build the .NET API in Release mode
      - name: Build .NET API
        working-directory: ./Rest_SikkerApi
        run: dotnet build --configuration Release

      # Step 8: Publish the .NET app (includes wwwroot with the Vue files)
      - name: Publish .NET API
        working-directory: ./Rest_SikkerApi
        run: dotnet publish --configuration Release --output ./publish

      # Step 9: Deploy the published output to Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: sikkerheds-app-JABLST
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./Rest_SikkerApi/Rest_SikkerApi/publish
