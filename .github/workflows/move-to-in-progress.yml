name: Move issue to Doing when branch is created
on:
  create:
    branches:
      - '**'
jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          script: |
            // Extract issue number from branch name
            const branch = context.ref.replace('refs/heads/', '');
            console.log(`Branch name: ${branch}`);
            const match = branch.match(/(\d+)/);

            if (!match) {
              console.log('No issue number found in branch name, skipping');
              return;
            }
            const issueNumber = parseInt(match[1]);
            console.log(`Found issue #${issueNumber}`);

            // Query the project board for the issue
            const query = `
              query($owner: String!, $repo: String!, $issue: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issue) {
                    title
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          id
                          title
                          fields(first: 20) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue: issueNumber
            });
            console.log('Issue title:', result.repository.issue?.title);
            console.log('Project items found:', result.repository.issue?.projectItems.nodes.length);

            // Loop through project items linked to this issue
            for (const item of result.repository.issue.projectItems.nodes) {

              // Find the Status field
              const statusField = item.project.fields.nodes.find(
                f => f.name === 'Status'
              );
              if (!statusField) {
                console.log('No Status field found, skipping');
                continue;
              }

              // Find "Doing" — must match column name exactly (case sensitive!)
              const doingOption = statusField.options.find(
                o => o.name === 'Doing'
              );
              if (!doingOption) {
                console.log('No Doing option found, skipping');
                continue;
              }

              // Move the issue to Doing
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item {
                      id
                    }
                  }
                }
              `, {
                projectId: item.project.id,
                itemId: item.id,
                fieldId: statusField.id,
                optionId: doingOption.id
              });
              console.log(`Moved issue #${issueNumber} to Doing ✅`);
            }
