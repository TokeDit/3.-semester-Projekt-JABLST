<svg width="900" height="760" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .sub { font: 400 14px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #4b5563; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .box { rx: 16; ry: 16; stroke-width: 2.5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#4b5563" />
    </marker>
  </defs>

  <text x="450" y="50" text-anchor="middle" class="title">Systemoversigt</text>

  <rect x="300" y="90" width="300" height="90" rx="16" ry="16" stroke-width="2.5" fill="#D6EAF8" stroke="#2E86C1"/>
  <text x="450" y="125" text-anchor="middle" class="label">PI</text>
  <text x="450" y="150" text-anchor="middle" class="sub">Dataindsamling</text>

  <rect x="300" y="240" width="300" height="100" rx="16" ry="16" stroke-width="2.5" fill="#D4EFDF" stroke="#239B56"/>
  <text x="450" y="278" text-anchor="middle" class="label">Backend</text>
  <text x="450" y="303" text-anchor="middle" class="sub">Forretningslogik og databehandling</text>

  <rect x="120" y="410" width="240" height="90" rx="16" ry="16" stroke-width="2.5" fill="#FADBD8" stroke="#CB4335"/>
  <text x="240" y="445" text-anchor="middle" class="label">Database</text>
  <text x="240" y="470" text-anchor="middle" class="sub">Lagring af data</text>

  <rect x="540" y="410" width="240" height="90" rx="16" ry="16" stroke-width="2.5" fill="#FCF3CF" stroke="#D4AC0D"/>
  <text x="660" y="445" text-anchor="middle" class="label">API</text>
  <text x="660" y="470" text-anchor="middle" class="sub">Eksponering af data</text>

  <rect x="300" y="560" width="300" height="90" rx="16" ry="16" stroke-width="2.5" fill="#E8DAEF" stroke="#884EA0"/>
  <text x="450" y="595" text-anchor="middle" class="label">Frontend</text>
  <text x="450" y="620" text-anchor="middle" class="sub">Brugergrænseflade</text>

  <rect x="300" y="690" width="300" height="50" rx="16" ry="16" stroke-width="2.5" fill="#F5EEF8" stroke="#6C3483"/>
  <text x="450" y="722" text-anchor="middle" class="label">Bruger</text>

  <path d="M450 180 L450 240" class="arrow"/>
  <text x="465" y="215" class="sub">Overfører data</text>

  <path d="M380 340 L260 410" class="arrow"/>
  <text x="255" y="365" class="sub">Lagrer data</text>

  <path d="M520 340 L640 410" class="arrow"/>
  <text x="595" y="365" class="sub">Eksponerer data</text>

  <path d="M660 500 L660 530 L450 530 L450 560" class="arrow"/>
  <text x="670" y="522" class="sub">Henter data</text>

  <path d="M450 650 L450 690" class="arrow"/>
  <text x="465" y="675" class="sub">Præsenterer data for</text>
</svg>
